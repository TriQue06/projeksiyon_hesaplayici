<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cumhurbaşkanlığı Seçim Simülatörü Pro</title>
    <style>
        :root {
            --primary: #007aff;
            --purple: #5e5ce6;
            --cyan: #32ade6;
            --turquoise: #00c7be;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --border: #d2d2d7;
            --success: #34c759;
            --danger: #ff3b30;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; font-size: 13px; }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar { -ms-overflow-style: none; scrollbar-width: none; }

        .container { max-width: 1700px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        h1 { font-size: 22px; font-weight: 700; grid-column: 1/-1; margin: 0 0 15px; display: flex; align-items: center; gap: 10px; color: var(--text); }
        
        .card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.04); border: 1px solid var(--border); margin-bottom: 15px; }
        .sidebar { height: calc(100vh - 40px); overflow-y: auto; padding-right: 5px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="text"], input[type="number"], button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; box-sizing: border-box; font-size: 13px; }
        
        button { background: var(--primary); color: #fff; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.danger { background: var(--danger); }
        button.outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .flex-row { display: flex; gap: 8px; align-items: center; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: transparent; color: #666; width: auto; padding: 8px 20px; border: none; margin: 0; font-size: 15px; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--turquoise); color: white; box-shadow: 0 2px 6px rgba(0, 199, 190, 0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Matrix Table */
        .matrix-container { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: linear-gradient(90deg, var(--primary), var(--purple)); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 10; font-weight: 600; }
        th:first-child { text-align: left; background: var(--primary); z-index: 11; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        td:first-child { text-align: left; font-weight: 600; border-right: 1px solid #eee; background: #fafafa; position: sticky; left: 0; z-index: 5; }
        
        .matrix-input { width: 70px !important; margin: 0 !important; text-align: center; background: #f0f4f8; border: 1px solid #d1d9e0 !important; font-weight: 600; }
        .matrix-input:focus { background: #fff; border-color: var(--cyan) !important; outline: none; box-shadow: 0 0 0 2px rgba(50, 173, 230, 0.2); }
        
        .del-btn { background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 4px; padding: 2px 6px; margin-left: 8px; font-size: 10px; cursor: pointer; width: auto; }
        .del-btn:hover { background: var(--danger); }

        /* Sonuç Kartları */
        .national-card { background: linear-gradient(135deg, #1d1d1f, #3a3a3c); color: white; border-radius: 12px; padding: 25px; box-shadow: 0 6px 16px rgba(0,0,0,.15); margin-bottom: 20px;}
        .national-card h2 { margin: 0 0 20px 0; font-size: 20px; }
        .national-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); align-items: center; font-size: 15px; }
        .national-line:last-child { border-bottom: none; }
        
        .progress-bar-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; margin-top: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--turquoise); border-radius: 5px; transition: width 0.5s ease; }

        .dist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .dist-card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,.04); border-top: 4px solid var(--purple); }
        .dist-card h3 { margin: 0 0 12px; font-size: 14px; color: var(--purple); border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .p-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f9f9f9; align-items: center; }

        .empty-state { padding: 60px 20px; text-align: center; color: #888; font-size: 15px; }
    </style>
</head>
<body>

<h1>🇹🇷 Cumhurbaşkanlığı Seçim Simülatörü <small style="font-weight:400; font-size:14px; color:#666">| Matris Dağılım Modeli</small></h1>

<div class="container">
    <div class="sidebar">
        <div class="card" style="border-left: 4px solid var(--cyan)">
            <label>📂 Veri & Proje Yönetimi</label>
            <div class="flex-row" style="margin-bottom: 8px;">
                <button class="outline" onclick="$('jsonInp').click()" title="Projeyi Yükle">JSON Yükle</button>
                <button class="outline" onclick="saveJSON()" title="Projeyi Kaydet">JSON Kaydet</button>
            </div>
            <button class="outline" onclick="downloadTXT()" style="border-color: var(--purple); color: var(--purple); margin-bottom: 0;">📝 Sonuçları TXT İndir</button>
            <input type="file" id="jsonInp" accept=".json" style="display:none">
        </div>

        <div class="card" style="border-left: 4px solid var(--primary)">
            <label>1. Milletvekili Çıktısı (.txt)</label>
            <input type="file" id="fileInp" accept=".txt">
            <div id="fileStatus" style="font-size: 12px; color: #666; margin-top: -5px; padding-bottom: 5px;">Sadece yeni veri çekmek için kullanın.</div>
        </div>

        <div class="card" style="border-left: 4px solid var(--purple)">
            <label>2. Cumhurbaşkanı Adayı Ekle</label>
            <div class="flex-row">
                <input id="newCandName" placeholder="Örn: Aday 1">
                <button onclick="addCandidate()" style="width:60px; font-size:16px">+</button>
            </div>
        </div>

        <div class="card" style="position: sticky; bottom: 0; background: #fff; z-index: 10; padding-top: 15px; border-top: 2px solid var(--border); margin-bottom:0;">
            <button id="runBtn" style="background:var(--turquoise); font-size:16px; padding:18px; color:#000; box-shadow: 0 4px 12px rgba(0, 199, 190, 0.4);">🚀 SONUÇLARI HESAPLA</button>
        </div>
    </div>

    <div>
        <div class="tabs">
            <button class="tab-btn active" id="tabBtn-matrix" onclick="switchTab('matrix')">📊 Oy Dağılım Matrisi</button>
            <button class="tab-btn" id="tabBtn-results" onclick="switchTab('results')">🏆 Seçim Sonuçları</button>
        </div>

        <div id="tab-matrix" class="tab-content active">
            <div class="matrix-container" id="matrixArea">
                <div class="empty-state">Lütfen veri dosyası yükleyin (.txt veya .json) ve en az bir aday ekleyin.</div>
            </div>
        </div>

        <div id="tab-results" class="tab-content">
            <div id="resultsArea">
                <div class="empty-state">Sonuçları görmek için oy dağılımlarını %100'e tamamlayıp "Hesapla" butonuna basın.</div>
            </div>
        </div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);

let districtData = {}; 
let detectedParties = []; 
let candidates = []; 
let distribution = {}; 
let globalDistResults = {}; // Sonuçları TXT indirmek için hafızada tutacağımız obje

// --- SEKME YÖNETİMİ ---
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    $( `tab-${tabId}`).classList.add('active');
    $( `tabBtn-${tabId}`).classList.add('active');
}

// --- DOSYA İŞLEMLERİ (TXT YÜKLEME) ---
$('fileInp').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    parseElectionsData(text);
    $('fileStatus').innerHTML = `<span style="color:var(--success);font-weight:bold">✓ ${file.name} çekildi.</span>`;
    renderMatrix();
};

function parseElectionsData(text) {
    districtData = {};
    const partiesSet = new Set();
    const blocks = text.split(/\n-\s*\n|\n\n+/);
    
    blocks.forEach(block => {
        const lines = block.trim().split('\n');
        if(lines.length < 2) return;
        let dName = lines[0].trim();
        const votes = {};
        
        lines.slice(1).forEach(l => {
            if (l.trim() === '-' || l.trim() === '') return;
            const parts = l.split(/\s+/);
            const voteCount = parseFloat(parts.pop());
            const partyName = parts.join(' ').trim().toUpperCase();
            if(!isNaN(voteCount) && partyName) {
                votes[partyName] = voteCount;
                partiesSet.add(partyName);
            }
        });
        if(Object.keys(votes).length > 0) districtData[dName] = votes;
    });
    
    detectedParties = Array.from(partiesSet).sort();
    
    const oldDist = distribution;
    distribution = {};
    detectedParties.forEach(p => {
        distribution[p] = oldDist[p] || {};
        candidates.forEach(c => {
            if (distribution[p][c] === undefined) distribution[p][c] = 0;
        });
    });
}

// --- DOSYA İŞLEMLERİ (JSON KAYDET/YÜKLE) ---
function saveJSON() {
    if(detectedParties.length === 0) return alert("Kaydedilecek veri yok!");
    const data = { districtData, detectedParties, candidates, distribution };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cumhurbaskanligi_proje.json';
    a.click();
}

$('jsonInp').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try {
        const text = await file.text();
        const data = JSON.parse(text);
        districtData = data.districtData || {};
        detectedParties = data.detectedParties || [];
        candidates = data.candidates || [];
        distribution = data.distribution || {};
        renderMatrix();
        alert("Proje başarıyla yüklendi!");
    } catch(err) {
        alert("JSON dosyası geçersiz veya bozuk.");
    }
};

// --- DOSYA İŞLEMLERİ (TXT SONUÇ İNDİR) ---
function downloadTXT() {
    if(Object.keys(globalDistResults).length === 0) return alert("Lütfen indirmeden önce sonuçları hesaplayın!");

    let txt = "";
    const sortedDistricts = Object.keys(globalDistResults).sort();

    sortedDistricts.forEach(dName => {
        // Çevre Adı (orijinal formatta zaten -MV sayısı içeriyorsa aynı şekilde çıkar)
        txt += `${dName}\n`;
        
        const dData = globalDistResults[dName];
        // Adayları aldıkları oylara göre büyükten küçüğe sırala
        const sortedCands = Object.entries(dData).sort((a,b) => b[1] - a[1]);
        
        sortedCands.forEach(([candName, candVotes]) => {
            // Aday Adı ve Tamsayı Oy
            txt += `${candName} ${Math.floor(candVotes)}\n`;
        });
        
        // Diğer txt'deki gibi ayraç eklendi
        txt += "-\n";
    });

    const blob = new Blob([txt], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cumhurbaskanligi_sonuc.txt';
    a.click();
}

// --- ADAY YÖNETİMİ ---
function addCandidate() {
    const name = $('newCandName').value.trim().toUpperCase();
    if(!name || candidates.includes(name)) return;
    
    candidates.push(name);
    detectedParties.forEach(p => {
        if(!distribution[p]) distribution[p] = {};
        distribution[p][name] = 0;
    });
    
    $('newCandName').value = '';
    renderMatrix();
}

function removeCandidate(idx) {
    const cName = candidates[idx];
    candidates.splice(idx, 1);
    detectedParties.forEach(p => {
        delete distribution[p][cName];
    });
    renderMatrix();
}

// --- MATRİS RENDER VE KONTROL ---
function renderMatrix() {
    const area = $('matrixArea');
    if(detectedParties.length === 0 || candidates.length === 0) {
        area.innerHTML = '<div class="empty-state">Lütfen veri dosyası yükleyin ve en az bir aday ekleyin.</div>';
        return;
    }

    let html = `<table>
        <thead>
            <tr>
                <th>PARTİ ADI</th>
                ${candidates.map((c, i) => `<th>${c} <button class="del-btn" onclick="removeCandidate(${i})">X</button></th>`).join('')}
                <th style="background:var(--text)">TOPLAM %</th>
            </tr>
        </thead>
        <tbody>`;

    detectedParties.forEach((p, pIdx) => {
        let rowSum = 0;
        candidates.forEach(c => rowSum += (parseFloat(distribution[p][c]) || 0));
        
        const isOk = Math.abs(rowSum - 100) < 0.01;
        const color = isOk ? 'var(--success)' : 'var(--danger)';
        const icon = isOk ? '✓' : '⚠';

        html += `<tr>
            <td>${p}</td>`;
        
        candidates.forEach(c => {
            html += `<td>
                <input type="number" class="matrix-input" min="0" max="100" step="0.1" value="${distribution[p][c] || 0}" 
                       oninput="updateDist(${pIdx}, '${c}', this.value)">
            </td>`;
        });

        html += `<td style="font-weight:bold; color:${color}; font-size:14px;" id="sumTd-${pIdx}">
            ${icon} %<span id="sumVal-${pIdx}">${rowSum}</span>
        </td></tr>`;
    });

    html += `</tbody></table>`;
    area.innerHTML = html;
}

function updateDist(pIdx, cName, val) {
    const pName = detectedParties[pIdx];
    distribution[pName][cName] = parseFloat(val) || 0;
    
    let sum = 0;
    candidates.forEach(c => sum += (parseFloat(distribution[pName][c]) || 0));
    
    const sumValEl = $(`sumVal-${pIdx}`);
    const sumTdEl = $(`sumTd-${pIdx}`);
    
    if(sumValEl && sumTdEl) {
        sumValEl.innerText = sum;
        const isOk = Math.abs(sum - 100) < 0.01;
        sumTdEl.style.color = isOk ? 'var(--success)' : 'var(--danger)';
        sumTdEl.innerHTML = `${isOk ? '✓' : '⚠'} %<span id="sumVal-${pIdx}">${sum}</span>`;
    }
}

// --- HESAPLAMA MOTORU ---
$('runBtn').onclick = () => {
    if(detectedParties.length === 0 || candidates.length === 0) return alert("Veri veya aday eksik!");

    let errors = [];
    detectedParties.forEach(p => {
        let sum = 0;
        candidates.forEach(c => sum += (distribution[p][c] || 0));
        if(Math.abs(sum - 100) > 0.01) errors.push(`${p} (%${sum})`);
    });

    if(errors.length > 0) {
        return alert(`HESAPLAMA YAPILAMAZ!\n\nAşağıdaki partilerin oy dağılımları toplamı %100 değil:\n\n${errors.join('\n')}\n\nLütfen matris tablosundaki kırmızı alanları düzeltin.`);
    }

    const natResults = {}; 
    globalDistResults = {}; // Sonuçları sıfırla ve hafızaya al
    let totalNationalValidVotes = 0;

    candidates.forEach(c => natResults[c] = 0);

    for (let dName in districtData) {
        globalDistResults[dName] = {};
        candidates.forEach(c => globalDistResults[dName][c] = 0);

        const dVotes = districtData[dName];
        
        for (let p in dVotes) {
            const partyRawVote = dVotes[p];
            candidates.forEach(c => {
                const supportPct = (distribution[p][c] || 0) / 100;
                const gainedVotes = partyRawVote * supportPct;
                
                globalDistResults[dName][c] += gainedVotes;
                natResults[c] += gainedVotes;
            });
        }
    }

    totalNationalValidVotes = Object.values(natResults).reduce((a, b) => a + b, 0);
    renderResults(natResults, globalDistResults, totalNationalValidVotes);
    switchTab('results'); 
};

// --- SONUÇLARI GÖSTERME ---
function renderResults(nat, dist, totalNatVotes) {
    const area = $('resultsArea');
    area.innerHTML = '';

    const natCard = document.createElement('div');
    natCard.className = 'national-card';
    
    let natHtml = `<h2>🇹🇷 TÜRKİYE GENELİ SONUÇLARI <span style="font-size:13px; font-weight:normal; opacity:0.7; float:right;">Top. Geçerli Oy: ${Math.floor(totalNatVotes).toLocaleString('tr-TR')}</span></h2>`;
    
    const sortedNat = Object.entries(nat).sort((a,b) => b[1] - a[1]);
    
    sortedNat.forEach(([candName, candVotes]) => {
        const pct = totalNatVotes > 0 ? ((candVotes / totalNatVotes) * 100).toFixed(2) : 0;
        const isWinner = pct > 50 ? '👑 ' : '';
        const wColor = pct > 50 ? 'var(--turquoise)' : '#fff';
        
        natHtml += `
            <div class="national-line" style="color:${wColor}">
                <div>
                    <span style="font-weight:bold; font-size:16px;">${isWinner}${candName}</span><br>
                    <span style="font-size:12px; opacity:0.8">${Math.floor(candVotes).toLocaleString('tr-TR')} Oy</span>
                </div>
                <div style="text-align:right; font-size:22px; font-weight:bold;">
                    %${pct}
                </div>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width: ${pct}%; background:${pct > 50 ? 'var(--turquoise)' : 'var(--cyan)'}"></div>
            </div>
        `;
    });
    natCard.innerHTML = natHtml;
    area.appendChild(natCard);

    const distGrid = document.createElement('div');
    distGrid.className = 'dist-grid';

    Object.keys(dist).sort().forEach(dName => {
        const dData = dist[dName];
        const dTotalVotes = Object.values(dData).reduce((a,b) => a+b, 0);
        
        const card = document.createElement('div');
        card.className = 'dist-card';
        card.innerHTML = `<h3>${dName}</h3>`;
        
        Object.entries(dData).sort((a,b)=>b[1]-a[1]).forEach(([candName, candVotes])=> {
            if(candVotes === 0 && dTotalVotes === 0) return;
            const pct = dTotalVotes > 0 ? ((candVotes / dTotalVotes) * 100).toFixed(2) : 0;
            
            const line = document.createElement('div');
            line.className = 'p-line';
            line.innerHTML = `
                <span style="font-weight:600; font-size:12px">${candName}</span>
                <div style="text-align:right">
                    <span style="font-weight:bold; color:var(--purple)">%${pct}</span><br>
                    <small style="color:#888; font-size:10px">${Math.floor(candVotes).toLocaleString('tr-TR')}</small>
                </div>
            `;
            card.appendChild(line);
        });
        distGrid.appendChild(card);
    });

    area.appendChild(distGrid);
}
</script>
</body>
</html>
